<body class="flex flex-col min-h-screen items-center justify-between overflow-x-hidden font-body-md text-on-background selection:bg-tertiary-fixed">
<!-- Atmospheric Background Layers -->
<div class="fixed inset-0 z-[-1] bg-pattern pointer-events-none"></div>
<!-- Top Branding Section -->

<h1 class="font-headline-sm text-headline-sm text-on-surface mb-sm">

<!-- Main Content Canvas -->

<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
</div>
<div class="col-span-1 rounded-xl overflow-hidden academic-glow flex flex-col gap-base">
<div class="h-1/2 bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container" style="font-size: 24px;">school</span>
</div>
<div class="h-1/2 bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed" style="font-size: 24px;">verified</span>
</div>
</div>
</div>
<!-- Authentication Actions -->
<div class="w-full space-y-md">
<!-- Primary Action -->

<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">account_balance</span>

<!-- Divider -->
<div class="flex items-center w-full gap-md py-base">
<div class="h-[1px] flex-grow bg-outline-variant opacity-30"></div>

<div class="h-[1px] flex-grow bg-outline-variant opacity-30"></div>
</div>

<a class="font-label-sm text-label-sm text-outline hover:text-on-surface transition-colors" href="#">Terms of Service</a>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.addEventListener('mousedown', () => {
                    button.style.transform = 'scale(0.97)';
                });
                button.addEventListener('mouseup', () => {
                    button.style.transform = '';
                });
                button.addEventListener('mouseleave', () => {
                    button.style.transform = '';
                });
            });

            // Smooth appear animation
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(10px)';
            main.style.transition = 'all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)';
            
            setTimeout(() => {
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
